name: Node CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    # This spins up a real, temporary MongoDB instance in the runner background
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Node Version
        run: node -v

      - name: Check NPM Version
        run: npm -v

      - name: Verify Server Starts
        env:
          MONGO_URI: mongodb://localhost:27017/ci_test_db
          JWT_SECRET: super_secret_test_key_123
        run: |
          node src/server.js &
          PID=$!
          sleep 5
          if kill -0 $PID 2>/dev/null; then
            echo "Server started successfully!"
            kill $PID
          else
            echo "Server failed to start or crashed immediately!"
            exit 1
          fi
